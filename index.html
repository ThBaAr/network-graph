<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Graph - Live from Google Sheets</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; overflow: hidden; }
        #cy { width: 100vw; height: 100vh; background: #16213e; display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 18px; z-index: 200; text-align: center;
        }
        #loading.hidden { display: none; }

        #info-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 340px; background: rgba(255, 255, 255, 0.97); border-radius: 16px; padding: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5); display: none; z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; transition: all 0.3s ease;
        }
        #info-panel.show { display: block; transform: translateX(-50%) scale(1); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
        #info-panel .close-btn {
            position: absolute; top: 10px; right: 16px; cursor: pointer; font-size: 20px;
            color: #999; background: none; border: none;
        }
        #info-panel .close-btn:hover { color: #333; }
        #info-panel .panel-image {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 8px auto; display: block; border: 3px solid #4A90D9;
        }
        #info-panel .panel-name { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        #info-panel .panel-description { font-size: 13px; color: #666; margin: 4px 0 0 0; line-height: 1.5; }

        #controls {
            position: absolute; top: 20px; left: 20px; z-index: 50;
            display: flex; flex-direction: column; gap: 6px;
        }
        #controls button {
            padding: 8px 14px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px; cursor: pointer; font-size: 12px; color: #eee;
            backdrop-filter: blur(8px); transition: all 0.2s; text-align: left;
        }
        #controls button:hover { background: rgba(74, 144, 217, 0.8); border-color: #4A90D9; }
        #controls .btn-label { font-size: 9px; color: #666; margin-top: 6px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        #controls .separator { border-top: 1px solid rgba(255, 255, 255, 0.05); margin: 4px 0; }

        #legend {
            position: absolute; bottom: 20px; right: 20px; z-index: 50;
            background: rgba(0, 0, 0, 0.7); padding: 10px 14px; border-radius: 10px;
            font-size: 11px; color: #ccc; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; background: #4A90D9; }
        #legend .dot.edge { width: 18px; height: 2px; border-radius: 0; background: #666; vertical-align: middle; }

        #search-box { position: absolute; top: 20px; right: 20px; z-index: 50; }
        #search-box input {
            padding: 10px 16px; width: 200px; border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px; font-size: 14px; background: rgba(0, 0, 0, 0.7);
            color: white; backdrop-filter: blur(8px);
        }
        #search-box input::placeholder { color: #888; }
        #search-box input:focus { outline: none; border-color: #4A90D9; box-shadow: 0 0 20px rgba(74, 144, 217, 0.2); }

        #hover-tooltip {
            position: fixed; background: rgba(0, 0, 0, 0.92); color: white; padding: 16px 20px;
            border-radius: 12px; font-size: 13px; pointer-events: none; display: none; z-index: 9999;
            max-width: 320px; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #hover-tooltip .tt-name { font-weight: 700; font-size: 17px; color: #4A90D9; }
        #hover-tooltip .tt-proof { font-size: 13px; color: #ccc; margin-top: 6px; line-height: 1.4; }
        #hover-tooltip .tt-proof-image { margin-top: 10px; max-width: 200px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); display: block; }

        #layout-indicator {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1); font-size: 11px; z-index: 10; pointer-events: none;
            font-family: monospace; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- CONFIGURE YOUR GOOGLE SHEETS PUBLISHED CSV URLS HERE -->
    <!-- ============================================================ -->
    <script>
        var NODES_CSV_URL = 'https://docs.google.com/spreadsheets/d/' + '1CRHoEqownGZLIN5aYwZNEDYsQspdmPgqmNCB054ymBA' + '/gviz/tq?tqx=out:csv&sheet=nodes';
        var EDGES_CSV_URL = 'https://docs.google.com/spreadsheets/d/' + '1CRHoEqownGZLIN5aYwZNEDYsQspdmPgqmNCB054ymBA' + '/gviz/tq?tqx=out:csv&sheet=edges';
    </script>
    <!-- ============================================================ -->

    <div id="cy"></div>
    <div id="layout-indicator">● LIVE DATA FROM SHEETS</div>
    <div id="loading">⏳ Loading data from Google Sheets...</div>

    <div id="controls">
        <div class="btn-label">⟲ View</div>
        <button onclick="resetGraph()">⟲ Reset View</button>
        <button onclick="toggleLabels()">🏷️ Toggle Labels</button>
        <div class="separator"></div>
        <div class="btn-label">🔎 Zoom</div>
        <button onclick="zoomIn()">➕ Zoom In</button>
        <button onclick="zoomOut()">➖ Zoom Out</button>
        <button onclick="fitGraph()">📐 Fit Graph</button>
        <button onclick="reapplyLayout()">🔄 Re-run Layout</button>
    </div>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="🔍 Search..." oninput="searchNode(this.value)">
    </div>

    <div id="legend">
        <span><span class="dot"></span> People</span>
        <span style="margin-left:12px;"><span class="dot edge"></span> Connections</span>
        <div style="font-size:9px;color:#666;margin-top:3px;">Click to focus • Hover connected nodes for details</div>
    </div>

    <div id="info-panel">
        <button class="close-btn" onclick="closeInfo()">✕</button>
        <img id="panel-image" class="panel-image" src="">
        <div id="panel-name" class="panel-name">Name</div>
        <div id="panel-description" class="panel-description">Description</div>
    </div>

    <div id="hover-tooltip">
        <div class="tt-name" id="tt-name">Name</div>
        <div class="tt-proof" id="tt-proof">Proof</div>
        <img id="tt-image" class="tt-proof-image" src="">
    </div>

    <script>
        // ============================================================
        // PARSE CSV (handles semicolons and quoted fields)
        // ============================================================
        function parseCSV(text) {
            var rows = [];
            var lines = text.split('\n');
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line === '') continue;
                var cols = [];
                var current = '';
                var inQuotes = false;
                for (var j = 0; j < line.length; j++) {
                    var ch = line[j];
                    if (ch === '"') {
                        inQuotes = !inQuotes;
                    } else if (ch === ';' && !inQuotes) {
                        cols.push(current.trim());
                        current = '';
                    } else {
                        current += ch;
                    }
                }
                cols.push(current.trim());
                rows.push(cols);
            }
            return rows;
        }

        // ============================================================
        // FETCH AND PARSE BOTH CSVs
        // ============================================================
        function fetchCSV(url) {
            return fetch(url)
                .then(function(response) { return response.text(); })
                .then(function(text) { return parseCSV(text); });
        }

        Promise.all([fetchCSV(NODES_CSV_URL), fetchCSV(EDGES_CSV_URL)])
            .then(function(results) {
                var nodesRaw = results[0];
                var edgesRaw = results[1];

                // Parse nodes (skip header row)
                // CSV column order: type;id;Cor;Nome;Imagem;Descrição
                var nodes = [];
                for (var i = 1; i < nodesRaw.length; i++) {
                    var row = nodesRaw[i];
                    if (row.length < 3 || row[1] === '') continue; // skip empty rows
                    nodes.push({
                        id: row[1],              // id
                        color: row[2] || '#4A90D9', // Cor
                        label: row[3],            // Nome
                        image: row[4] || '',      // Imagem
                        description: row[5] || '' // Descrição
                    });
                }

                // Parse edges (skip header row)
                // CSV column order: type;id;source(id);target(id);Descrição;Imagem(se houver)
                var edges = [];
                for (var i = 1; i < edgesRaw.length; i++) {
                    var row = edgesRaw[i];
                    if (row.length < 4 || row[1] === '') continue; // skip empty rows
                    edges.push({
                        id: row[1],               // id
                        source: row[2],           // source(id)
                        target: row[3],           // target(id)
                        proof: row[4] || '',      // Descrição
                        proofImage: row[5] || ''  // Imagem(se houver)
                    });
                }

                document.getElementById('loading').classList.add('hidden');
                buildGraph(nodes, edges);
            })
            .catch(function(err) {
                document.getElementById('loading').innerHTML =
                    '❌ Error loading data.<br><small>Check your Google Sheets URLs and make sure they are published as CSV.</small><br><br>' +
                    '<small style="color:#888;">' + err.message + '</small>';
                console.error(err);
            });

        // ============================================================
        // BUILD GRAPH
        // ============================================================
        function buildGraph(nodes, edges) {
            var coseLayout = {
                name: 'cose',
                fit: true,
                padding: 50,
                idealEdgeLength: 120,
                nodeRepulsion: 500,
                gravity: 0.25,
                numIter: 1000,
                initialTemp: 200,
                coolingFactor: 0.95,
                minTemp: 1.0
            };

            function createCircularImage(url, size, callback) {
                var img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    var ctx = canvas.getContext('2d');
                    ctx.beginPath();
                    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();
                    var scale = Math.max(size / img.width, size / img.height);
                    var x = (size / 2) - (img.width / 2) * scale;
                    var y = (size / 2) - (img.height / 2) * scale;
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    callback(canvas.toDataURL('image/png'));
                };
                img.onerror = function() { callback(null); };
                img.src = url;
            }

            var processedNodes = [];
            var totalNodes = nodes.length;
            var processedCount = 0;

            nodes.forEach(function(node) {
                createCircularImage(node.image, 120, function(dataUrl) {
                    processedCount++;
                    if (dataUrl) {
                        processedNodes.push({
                            id: node.id,
                            label: node.label,
                            color: node.color,
                            image: dataUrl,
                            description: node.description
                        });
                    } else {
                        processedNodes.push(node);
                    }
                    if (processedCount === totalNodes) {
                        initCytoscape();
                    }
                });
            });

            function initCytoscape() {
                var finalElements = [];

                processedNodes.forEach(function(n) {
                    finalElements.push({
                        data: {
                            id: n.id,
                            label: n.label,
                            color: n.color,
                            image: n.image,
                            description: n.description
                        }
                    });
                });

                edges.forEach(function(e) {
                    finalElements.push({
                        data: {
                            id: e.id,
                            source: e.source,
                            target: e.target,
                            proof: e.proof,
                            proofImage: e.proofImage
                        }
                    });
                });

                var cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: finalElements,
                    style: [{
                        selector: 'node',
                        style: {
                            'width': 65,
                            'height': 65,
                            'background-image': 'data(image)',
                            'background-fit': 'cover',
                            'background-clip': 'none',
                            'background-color': '#2c3e50',
                            'border-color': 'data(color)',
                            'border-width': 3,
                            'border-opacity': 1,
                            'label': 'data(label)',
                            'color': '#ffffff',
                            'font-size': 12,
                            'font-weight': 'bold',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'text-margin-y': 10,
                            'text-outline-width': 2,
                            'text-outline-color': 'rgba(0,0,0,0.8)',
                            'shadow-blur': 10,
                            'shadow-color': 'rgba(0,0,0,0.5)',
                            'shadow-offset-x': 2,
                            'shadow-offset-y': 4
                        }
                    }, {
                        selector: 'node:selected',
                        style: {
                            'width': 85,
                            'height': 85,
                            'border-width': 6,
                            'border-color': '#ffffff',
                            'shadow-blur': 30,
                            'shadow-color': 'data(color)'
                        }
                    }, {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#666',
                            'target-arrow-color': '#666',
                            'curve-style': 'bezier',
                            'opacity': 0.5
                        }
                    }, {
                        selector: 'node:unselected',
                        style: { 'opacity': 0.3 }
                    }, {
                        selector: 'edge:unselected',
                        style: { 'opacity': 0.15 }
                    }, {
                        selector: 'node.focused-connected',
                        style: {
                            'border-width': 4,
                            'border-color': '#FFD700',
                            'shadow-blur': 20,
                            'shadow-color': '#FFD700'
                        }
                    }, {
                        selector: 'node.focused-distance',
                        style: { 'opacity': 0.1 }
                    }],
                    layout: coseLayout
                });

                // ============================================================
                // INTERACTIONS
                // ============================================================
                var focusedNodeId = null;
                var connectedIds = [];
                var tooltip = document.getElementById('hover-tooltip');
                var tooltipTimeout = null;
                var labelsVisible = true;

                cy.on('mouseover', 'node', function(e) {
                    var node = e.target;
                    var nodeId = node.id();
                    var data = node.data();

                    if (focusedNodeId === null) {
                        document.getElementById('tt-name').textContent = data.label || data.id;
                        document.getElementById('tt-proof').textContent = data.description || 'No description';
                        document.getElementById('tt-image').style.display = 'none';
                        positionTooltip(e);
                        return;
                    }

                    if (connectedIds.indexOf(nodeId) !== -1) {
                        var foundEdge = findEdgeBetween(focusedNodeId, nodeId);
                        if (foundEdge) {
                            var edgeData = foundEdge.data();
                            document.getElementById('tt-name').textContent = data.label || data.id;
                            document.getElementById('tt-proof').textContent = edgeData.proof || 'Connected';
                            var proofImg = document.getElementById('tt-image');
                            if (edgeData.proofImage) {
                                proofImg.src = edgeData.proofImage;
                                proofImg.style.display = 'block';
                            } else {
                                proofImg.style.display = 'none';
                            }
                            positionTooltip(e);
                        }
                    } else {
                        tooltip.style.display = 'none';
                    }
                });

                function positionTooltip(e) {
                    var mouseX = e.originalEvent.clientX;
                    var mouseY = e.originalEvent.clientY;
                    tooltip.style.display = 'block';
                    tooltip.style.left = (mouseX + 20) + 'px';
                    tooltip.style.top = (mouseY - 10) + 'px';
                    var tooltipRect = tooltip.getBoundingClientRect();
                    if (tooltipRect.right > window.innerWidth) {
                        tooltip.style.left = (mouseX - tooltipRect.width - 20) + 'px';
                    }
                    if (tooltipRect.bottom > window.innerHeight) {
                        tooltip.style.top = (mouseY - tooltipRect.height - 10) + 'px';
                    }
                    clearTimeout(tooltipTimeout);
                }

                cy.on('mouseout', 'node', function(e) {
                    tooltipTimeout = setTimeout(function() { tooltip.style.display = 'none'; }, 100);
                });

                function findEdgeBetween(nodeId1, nodeId2) {
                    var found = null;
                    cy.edges().forEach(function(edge) {
                        var source = edge.source().id();
                        var target = edge.target().id();
                        if ((source === nodeId1 && target === nodeId2) ||
                            (source === nodeId2 && target === nodeId1)) {
                            found = edge;
                        }
                    });
                    return found;
                }

                cy.on('click', 'node', function(e) {
                    var node = e.target;
                    var data = node.data();
                    focusedNodeId = node.id();
                    connectedIds = getConnectedNodeIds(focusedNodeId);

                    cy.elements().unselect();
                    node.select();

                    cy.nodes().forEach(function(n) {
                        n.removeClass('focused-connected');
                        n.removeClass('focused-distance');
                        if (n.id() === focusedNodeId) {
                            // focused
                        } else if (connectedIds.indexOf(n.id()) !== -1) {
                            n.addClass('focused-connected');
                        } else {
                            n.addClass('focused-distance');
                        }
                    });

                    cy.animate({ zoom: 1.5, center: { eles: node }, duration: 500 });

                    document.getElementById('panel-name').textContent = data.label || data.id;
                    document.getElementById('panel-description').textContent = data.description || 'No description available.';
                    var img = document.getElementById('panel-image');
                    if (data.image) {
                        img.src = data.image;
                        img.style.display = 'block';
                    } else {
                        img.style.display = 'none';
                    }
                    document.getElementById('info-panel').classList.add('show');
                    document.querySelector('#legend div').textContent = '🔵 Focus on ' + (data.label || data.id) + ' • Hover connected nodes';
                });

                function getConnectedNodeIds(nodeId) {
                    var connected = [];
                    cy.edges().forEach(function(edge) {
                        var source = edge.source().id();
                        var target = edge.target().id();
                        if (source === nodeId && connected.indexOf(target) === -1) connected.push(target);
                        if (target === nodeId && connected.indexOf(source) === -1) connected.push(source);
                    });
                    return connected;
                }

                cy.on('click', function(e) {
                    if (e.target === cy) resetFocus();
                });

                function resetFocus() {
                    focusedNodeId = null;
                    connectedIds = [];
                    cy.nodes().removeClass('focused-connected');
                    cy.nodes().removeClass('focused-distance');
                    cy.elements().unselect();
                    document.querySelector('#legend div').textContent = 'Click to focus • Hover connected nodes for details';
                }

                window.toggleLabels = function() {
                    labelsVisible = !labelsVisible;
                    cy.style().selector('node').style('label', labelsVisible ? 'data(label)' : '').update();
                    document.querySelector('#controls button:nth-child(3)').textContent = labelsVisible ? '🏷️ Toggle Labels' : '🏷️ Show Labels';
                };

                window.reapplyLayout = function() { cy.layout(coseLayout).run(); };
                window.fitGraph = function() { cy.fit(); cy.center(); };

                window.resetGraph = function() {
                    cy.animate({ zoom: 1, center: { x: 0, y: 0 }, duration: 500 });
                    resetFocus();
                    document.getElementById('info-panel').classList.remove('show');
                    tooltip.style.display = 'none';
                };

                window.zoomIn = function() {
                    var level = cy.zoom() * 1.3;
                    if (level > 4) level = 4;
                    cy.animate({ zoom: level, duration: 300 });
                };

                window.zoomOut = function() {
                    var level = cy.zoom() * 0.7;
                    if (level < 0.2) level = 0.2;
                    cy.animate({ zoom: level, duration: 300 });
                };

                window.searchNode = function(query) {
                    if (!query || query.length < 2) {
                        cy.elements().removeClass('unselected');
                        cy.elements().style('opacity', 1);
                        return;
                    }
                    query = query.toLowerCase();
                    cy.nodes().forEach(function(node) {
                        var label = (node.data('label') || '').toLowerCase();
                        if (label.indexOf(query) !== -1) {
                            node.removeClass('unselected');
                            node.style('opacity', 1);
                        } else {
                            node.addClass('unselected');
                            node.style('opacity', 0.2);
                        }
                    });
                };

                window.closeInfo = function() {
                    document.getElementById('info-panel').classList.remove('show');
                    resetFocus();
                    cy.elements().unselect();
                };

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') { closeInfo(); tooltip.style.display = 'none'; }
                    if (e.key === 'r' || e.key === 'R') { resetGraph(); }
                    if (e.key === 'l' || e.key === 'L') { toggleLabels(); }
                });

                console.log('✅ Graph loaded with ' + cy.nodes().length + ' nodes and ' + cy.edges().length + ' edges');
                console.log('💡 Data sourced from Google Sheets');
                console.log('💡 Click a node to focus on it • Press ESC to reset');
            }
        }
    </script>
</body>
</html>
